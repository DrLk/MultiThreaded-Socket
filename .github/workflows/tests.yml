name: Tests

on:
    pull_request

jobs:
    test-job:
        runs-on: ubuntu-22.04
        container:
            image: ghcr.io/drlk/clang-tidy-image:v16
            credentials:
                username: drlk
                password: ${{ secrets.DOCKER_CONTAINER_REGISTRY_TOKEN }}
            options: --privileged --device /dev/fuse
        steps:
            - name: Checkout
              uses: actions/checkout@v3
              with:
                submodules: true

            - name: Load fuse module
              run: modprobe fuse || true

            - name: Build
              run: |
                cd ./SimpleNetworkProtocol/build
                time cmake -G "Ninja" ..
                time cmake --build . -- -j$(nproc)

            - name: Run tests
              run: |
                cd ./SimpleNetworkProtocol/build
                ./SimpleNetworkProtocolTest
