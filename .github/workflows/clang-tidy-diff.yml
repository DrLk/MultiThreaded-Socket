name: Clang Tidy Diff

on:
    push

jobs:
    clang-tidy-diff-job:
        runs-on: ubuntu-24.04
        container:
            image: ghcr.io/drlk/clang-tidy-image:v16
            credentials:
                username: drlk
                password: ${{ secrets.DOCKER_CONTAINER_REGISTRY_TOKEN }}
        steps:
            - name: Checkout
              uses: actions/checkout@v3
              with:
                submodules: true
                fetch-depth: 0

            - name: Build (generate compile_commands.json)
              shell: bash
              run: |
                git config --global --add safe.directory "$GITHUB_WORKSPACE"
                cd ./SimpleNetworkProtocol/build
                export CC=clang
                export CXX=clang++
                time cmake -G "Ninja" -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ..
                time cmake --build . -- -j12

            - name: clang-tidy
              shell: bash
              run: |
                git config --global --add safe.directory "$GITHUB_WORKSPACE"
                if [ "${{ github.event_name }}" = "pull_request" ]; then
                  BASE="origin/${{ github.base_ref }}"
                else
                  BASE="origin/master"
                fi
                CHANGED_FILES=$(git diff --name-only $BASE...HEAD \
                  | grep -E '\.(cpp|cxx|cc|c|hpp|hxx|h)$' || true)
                if [ -z "$CHANGED_FILES" ]; then
                  echo "No C/C++ files changed."
                  exit 0
                fi
                echo "$CHANGED_FILES"
                echo "$CHANGED_FILES" | xargs -P$(nproc) -I{} \
                  clang-tidy -p SimpleNetworkProtocol/build --use-color {}
