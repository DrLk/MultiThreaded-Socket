name: Pull Request

on:
    pull_request

jobs:
    clang-format-job:
        runs-on: ubuntu-24.04
        permissions:
            contents: write
        container:
            image: ghcr.io/drlk/clang-tidy-image:v16
            credentials:
                username: drlk
                password: ${{ secrets.DOCKER_CONTAINER_REGISTRY_TOKEN }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                ref: ${{ github.head_ref }}
                fetch-depth: 0

            - name: Run clang-format on changed files
              run: |
                BASE="origin/${{ github.base_ref }}"
                CHANGED_FILES=$(git diff --name-only $BASE...HEAD \
                  | grep -E '\.(cpp|cxx|cc|c|hpp|hxx|h)$' || true)
                if [ -z "$CHANGED_FILES" ]; then
                  echo "No C/C++ files changed."
                  exit 0
                fi
                echo "$CHANGED_FILES"
                echo "$CHANGED_FILES" | xargs clang-format -i

            - name: Commit formatting changes
              run: |
                git config --global --add safe.directory "$GITHUB_WORKSPACE"
                git config user.name "github-actions[bot]"
                git config user.email "github-actions[bot]@users.noreply.github.com"
                if git diff --quiet; then
                  echo "No formatting changes."
                else
                  git add -u
                  git commit -m "style: apply clang-format"
                  git push
                fi

    clang-tidy-job:
        needs: clang-format-job
        runs-on: ubuntu-24.04
        container:
            image: ghcr.io/drlk/clang-tidy-image:v16
            credentials:
                username: drlk
                password: ${{ secrets.DOCKER_CONTAINER_REGISTRY_TOKEN }}
        steps:
            - name: Checkout
              uses: actions/checkout@v3
              with:
                ref: ${{ github.head_ref }}
                submodules: true
            - name: clang-tidy
              shell: sh
              run: |
                cmake --version
                clang-tidy --version
                g++ --version
                clang++ --version
                cd ./SimpleNetworkProtocol/build
                time cmake ..
                time cmake --build . -- -j12
                rm -r *
                export CC=clang
                export CXX=clang++
                time cmake -G "Ninja" -DCMAKE_CXX_CLANG_TIDY="clang-tidy;-header-filter=." ..
                time cmake --build .

    test-job:
        needs: clang-format-job
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v3
              with:
                ref: ${{ github.head_ref }}
                submodules: true

            - name: Install and load FUSE
              run: |
                sudo apt-get update
                sudo apt-get install -y fuse3
                sudo modprobe fuse

            - name: Configure kernel network parameters
              run: |
                sudo sysctl -p ${{ github.workspace }}/SimpleNetworkProtocol/sysctl.conf
                sudo tc qdisc replace dev lo root fq

            - name: Login to container registry
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: drlk
                password: ${{ secrets.DOCKER_CONTAINER_REGISTRY_TOKEN }}

            - name: Build and Run tests
              run: |
                docker run --rm \
                  --privileged \
                  --network=host \
                  --device /dev/fuse \
                  --security-opt apparmor:unconfined \
                  --entrypoint "" \
                  -v ${{ github.workspace }}:/workspace \
                  -w /workspace \
                  ghcr.io/drlk/clang-tidy-image:v16 \
                  bash -c "cd SimpleNetworkProtocol/build && CC=clang CXX=clang++ cmake -G Ninja .. && cmake --build . -- -j\$(nproc) && TSAN_OPTIONS="halt_on_error=1" ./SimpleNetworkProtocolTest"
