services:
  fuse-client:
    image: clang-tidy-image
    volumes:
      - .:/build
    privileged: true
    network_mode: host
    devices:
      - /dev/fuse
    stop_signal: SIGINT
    stop_grace_period: 5s
    entrypoint: []
    # Start FUSE mount, wait for it, then export via kernel NFS.
    # With network_mode: host, nfsd binds directly to host port 2049.
    # Mode 4: <bind_addr> <bind_port> <mount_point> <cache_dir>
    command:
      - /bin/sh
      - -c
      - |
        cleanup() {
            echo "Shutting down..."
            exportfs -ua
            rpc.nfsd 0
            umount /mnt/test 2>/dev/null || true
        }
        trap cleanup INT TERM

        mkdir -p /mnt/test /tmp/snp-cache
        /build/SimpleNetworkProtocol/build/SimpleNetworkProtocol 4 0.0.0.0 11200 /mnt/test /tmp/snp-cache &
        FUSE_PID=$!
        echo "Waiting for FUSE mount..."
        until mountpoint -q /mnt/test; do sleep 1; done
        echo "FUSE mounted, starting NFS server..."
        mount -t nfsd nfsd /proc/fs/nfsd 2>/dev/null || true
        echo "/mnt/test *(rw,no_subtree_check,no_root_squash,fsid=0)" > /etc/exports
        rpcbind -w
        rpc.nfsd 8
        rpc.mountd --no-udp
        exportfs -ra
        echo "NFS ready: /mnt/test"
        wait $FUSE_PID

  file-server:
    image: clang-tidy-image
    volumes:
      - .:/build
      - /tmp:/tmp
    network_mode: host
    security_opt:
      - label=disable
    entrypoint: []
    depends_on:
      - fuse-client
    # Mode 3: <bind_addr> <bind_port> <dst_addr> <dst_port> <share_dir> <cache_dir>
    command:
      - /bin/sh
      - -c
      - |
        sleep 3
        mkdir -p /var/snp-cache
        exec /build/SimpleNetworkProtocol/build/SimpleNetworkProtocol 3 0.0.0.0 11100 127.0.0.1 11200 /tmp /var/snp-cache
